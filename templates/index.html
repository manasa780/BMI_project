<!DOCTYPE html>
<html>
<head>
<title>BMI Calculator</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
}

.container{
width:800px;
margin:auto;
margin-top:40px;
background:white;
padding:30px;
box-shadow:0px 0px 10px gray;
}

h2{
color:#1e4f7a;
}

.form-box{
display:flex;
gap:40px;
}

.left{
width:40%;
}

.right{
width:60%;
}

label{
display:block;
margin-top:10px;
}

input{
width:100%;
padding:8px;
margin-top:5px;
}

button{
margin-top:15px;
padding:10px;
background:#2e7d32;
color:white;
border:none;
width:100%;
cursor:pointer;
}

.result-box{
background:#4caf50;
color:white;
padding:10px;
margin-bottom:10px;
}

.gauge{
width:100%;
height:150px;
background:linear-gradient(to right,
red 0%,
orange 25%,
green 50%,
yellow 75%,
red 100%);
border-radius:100px 100px 0 0;
position:relative;
}

.needle{
width:2px;
height:120px;
background:black;
position:absolute;
bottom:0;
left:50%;
transform-origin:bottom;
}

</style>

</head>

<body>

<div class="container">

<h2>BMI Calculator</h2>

<div class="form-box">

<div class="left">

<form method="POST">
{% csrf_token %}

<label>Age</label>
<input type="number" name="age">

<label>Gender</label>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female

<label>Height (cm)</label>
<input type="number" name="height">

<label>Weight (kg)</label>
<input type="number" name="weight">

<button type="submit">Calculate</button>

</form>

</div>

<div class="right">

{% if result %}

<div class="result-box">
{{ result }}
</div>

<div class="gauge">
<div class="needle" style="transform: rotate({{ angle }}deg);"></div>
</div>

{% endif %}

</div>

</div>

</div>

</body>
</html>
